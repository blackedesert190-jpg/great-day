<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Glowing Lotus Meadow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,500&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #07040a;
            --rose-gold: #e5a4b4;
            --deep-plum: #321625;
            --bright-lotus: #f26d97;
            --gold-glow: #e0b034;
            --champagne: #fff5ea;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }
        
        #container {
            position: relative;
            width: 94vw;
            height: 86vh;
            max-width: 420px;
            max-height: 740px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            background: radial-gradient(circle at center 80%, #1a0f24 0%, #060308 100%);
            border-radius: 32px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.85), inset 0 1px 0px rgba(255,255,255,0.1);
            overflow: hidden;
        }

        #container::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at 30% 80%, rgba(242, 109, 151, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 40%, rgba(224, 176, 52, 0.05) 0%, transparent 40%);
            animation: ambientDrift 20s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes ambientDrift {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(10deg) scale(1.1); }
        }

        canvas {
            background: transparent;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Enhanced iOS-Style Premium Button */
        #playBtn {
            position: relative;
            z-index: 10;
            padding: 20px 50px;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3), 0 0 15px rgba(242, 109, 151, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: buttonPulse 3s infinite ease-in-out;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes buttonPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 30px rgba(0,0,0,0.3), 0 0 15px rgba(242, 109, 151, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 15px 40px rgba(0,0,0,0.4), 0 0 30px rgba(242, 109, 151, 0.6); }
        }

        #playBtn:active { transform: scale(0.95); background: rgba(242, 109, 151, 0.3); }

        #wowOverlay {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            transition: opacity 2.5s ease;
            background-image: radial-gradient(var(--champagne), rgba(255,255,255,.15) 1.5px, transparent 2.5px);
            background-size: 200px 200px;
        }

        #wowOverlay.active { opacity: 1; }

        #greetingText {
            position: absolute;
            top: 13%; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 28px;
            color: var(--champagne);
            text-align: center;
            width: 90%;
            text-shadow: 0 0 20px rgba(242, 109, 151, 0.5);
            pointer-events: none;
        }

        .magic-char {
            display: inline-block;
            opacity: 0;
            animation: premiumSpell 1s forwards;
        }

        @keyframes premiumSpell {
            to { opacity: 1; }
        }

        .hide { opacity: 0; pointer-events: none; transition: 0.8s; }
    </style>
</head>
<body>

    <div id="container">
        <canvas id="lotusCanvas"></canvas>
        <div id="wowOverlay"></div>
        <button id="playBtn">CLICK ME</button>
        <div id="greetingText"></div>
    </div>

<script>
const canvas = document.getElementById('lotusCanvas'), ctx = canvas.getContext('2d');
const playBtn = document.getElementById('playBtn'), greetingText = document.getElementById('greetingText'), wowOverlay = document.getElementById('wowOverlay');
let flowers = [], particles = [], animationId, textTriggered = false, wowEffectTriggered = false;

function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width; canvas.height = rect.height;
}

class Particle {
    constructor(x, y) {
        this.x = x + (Math.random() * 20 - 10); this.y = y;
        this.size = Math.random() * 2 + 0.5;
        this.speedY = -Math.random() * 0.8 - 0.2;
        this.alpha = 1;
    }
    update() { this.y += this.speedY; this.alpha -= 0.01; }
    draw() { ctx.fillStyle = `rgba(242, 109, 151, ${this.alpha})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
}

class Lotus {
    constructor(x) {
        this.x = x; this.startY = canvas.height + 50;
        this.targetY = canvas.height * (0.35 + Math.random() * 0.45);
        this.controlX = this.x + (Math.random() * 120 - 60);
        this.controlY = this.startY - (this.startY - this.targetY) * 0.5;
        this.progress = 0; this.bloom = 0;
        this.size = canvas.width * (0.07 + Math.random() * 0.05);
    }
    draw() {
        ctx.strokeStyle = '#142118'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(this.x, this.startY);
        ctx.quadraticCurveTo(this.controlX, this.controlY, this.x, this.targetY);
        ctx.stroke();
        if (this.progress >= 1) {
            ctx.fillStyle = '#f26d97'; ctx.beginPath(); ctx.arc(this.x, this.targetY, this.size * this.bloom, 0, Math.PI * 2); ctx.fill();
        }
    }
}

function init() {
    resize(); flowers = []; textTriggered = false;
    for (let i = 0; i < 18; i++) flowers.push(new Lotus(canvas.width * 0.05 + Math.random() * 0.9 * canvas.width));
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let bloomed = 0;
    flowers.forEach(f => {
        if (f.progress < 1) f.progress += 0.01;
        else if (f.bloom < 1) f.bloom += 0.02;
        f.draw();
        if (f.bloom >= 0.8) bloomed++;
    });
    if (bloomed >= 5 && !textTriggered) {
        textTriggered = true;
        greetingText.innerHTML = "Have a Beautiful Day".split("").map((c, i) => `<span class="magic-char" style="animation-delay:${i*0.05}s">${c}</span>`).join("");
        wowOverlay.classList.add('active');
    }
    animationId = requestAnimationFrame(animate);
}

playBtn.addEventListener('click', () => {
    playBtn.classList.add('hide');
    init(); animate();
});
</script>
</body>
</html>
