<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Glowing Lotus Meadow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,500&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #07040a;
            --rose-gold: #e5a4b4;
            --deep-plum: #321625;
            --bright-lotus: #f26d97;
            --gold-glow: #e0b034;
            --champagne: #fff5ea;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }
        
        #container {
            position: relative;
            width: 94vw;
            height: 86vh;
            max-width: 420px;
            max-height: 740px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            background: radial-gradient(circle at center 80%, #1a0f24 0%, #060308 100%);
            border-radius: 32px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.85), 
                        inset 0 1px 0px rgba(255,255,255,0.1);
            overflow: hidden;
        }

        /* Ambient Breathing Lights in Background */
        #container::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at 30% 80%, rgba(242, 109, 151, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 40%, rgba(224, 176, 52, 0.05) 0%, transparent 40%);
            animation: ambientDrift 20s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes ambientDrift {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(10deg) scale(1.1); }
        }

        canvas {
            background: transparent;
            border-radius: 32px;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #wowOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 32px;
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            transition: opacity 2.5s cubic-bezier(0.25, 1, 0.5, 1);
            background-image: 
                radial-gradient(var(--champagne), rgba(255,255,255,.15) 1.5px, transparent 2.5px),
                radial-gradient(var(--rose-gold), rgba(229,164,180,.1) 1px, transparent 2px);
            background-size: 200px 200px, 130px 130px;
            animation: shimmerBackground 15s linear infinite;
        }

        @keyframes shimmerBackground {
            0% { background-position: 0 0, 10px 20px; }
            100% { background-position: 200px 200px, 140px 280px; }
        }

        #wowOverlay.active {
            opacity: 1;
            box-shadow: inset 0 0 100px 30px rgba(229, 164, 180, 0.15);
        }

        /* Glassmorphic Premium Button */
        #playBtn {
            position: relative;
            z-index: 10;
            padding: 18px 44px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 4px;
            color: var(--champagne);
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4),
                        0 0 25px rgba(242, 109, 151, 0.1);
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            touch-action: manipulation;
        }

        #playBtn:hover {
            border-color: var(--rose-gold);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4),
                        0 0 30px rgba(242, 109, 151, 0.25);
            letter-spacing: 6px;
        }

        #playBtn:active {
            transform: scale(0.97);
        }

        #greetingText {
            position: absolute;
            top: 13%; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 28px;
            font-weight: 400;
            letter-spacing: 2px;
            color: var(--champagne);
            text-align: center;
            pointer-events: none;
            width: 90%;
            text-shadow: 0 0 20px rgba(242, 109, 151, 0.5), 
                         0 4px 12px rgba(0,0,0,0.8);
            line-height: 1.5;
        }

        .magic-char {
            display: inline-block;
            opacity: 0;
            transform: translateY(8px) scale(0.95);
            filter: blur(6px);
            animation: premiumSpell 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes premiumSpell {
            0% {
                opacity: 0;
                transform: translateY(12px) scale(0.9);
                filter: blur(8px);
                color: var(--gold-glow);
            }
            60% {
                opacity: 0.8;
                filter: blur(2px);
                color: var(--bright-lotus);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0px);
                color: var(--champagne);
            }
        }

        .hide {
            opacity: 0 !important;
            pointer-events: none !important;
            transform: translateY(20px) scale(0.9) !important;
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
    </style>
</head>
<body>

    <div id="container">
        <canvas id="lotusCanvas"></canvas>
        <div id="wowOverlay"></div>
        <button id="playBtn">CLICK ME</button>
        <div id="greetingText"></div>
    </div>

<script>
const container = document.getElementById('container');
const canvas = document.getElementById('lotusCanvas');
const ctx = canvas.getContext('2d');
const playBtn = document.getElementById('playBtn');
const greetingText = document.getElementById('greetingText');
const wowOverlay = document.getElementById('wowOverlay');

let flowers = [];
let particles = [];
let animationId;
let textTriggered = false;
let wowEffectTriggered = false;

const PINK_GLOW = 'rgba(242, 109, 151, 0.7)';
const GOLD_GLOW = 'rgba(224, 176, 52, 0.8)';
const WHITE_CORE = '#fff5ea';

function resizeCanvas() {
    const rect = container.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
}

class Particle {
    constructor(x, y, color = WHITE_CORE, glow = PINK_GLOW, speedMult = 1, sizeMult = 1) {
        this.x = x + (Math.random() * 20 - 10);
        this.y = y;
        this.size = (Math.random() * 1.8 + 0.5) * sizeMult;
        this.speedY = -(Math.random() * 0.7 + 0.2) * speedMult;
        this.speedX = (Math.random() * 0.6 - 0.3) * speedMult;
        this.alpha = 1;
        this.fade = (Math.random() * 0.008 + 0.004);
        this.color = color;
        this.glow = glow;
    }
    update() {
        this.y += this.speedY;
        this.x += this.speedX;
        this.alpha -= this.fade;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.glow;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

class Lotus {
    constructor(x) {
        this.x = x;
        this.startY = canvas.height + 20 + (Math.random() * 40); 
        this.currentProgress = 0; 
        
        this.growSpeed = 0.003 + Math.random() * 0.004; 
        
        // Dynamic target window allows flowers to dynamically shoot up very high (up to 32% top area) 
        // down to very low (78%), mimicking your layout accurately while leaving breathing room under the greeting text.
        this.targetY = canvas.height * (0.32 + Math.random() * 0.46);
        
        this.bloomProgress = 0; 
        
        // Scale the flower size according to its height for natural visual depth 
        const heightFactor = (this.targetY / canvas.height); 
        this.maxFlowerSize = canvas.width * (0.06 + (heightFactor * 0.05)); 

        // Elegant flowing natural arches for the stems
        this.controlX = this.x + (Math.random() * 100 - 50);
        this.controlY = this.startY - (this.startY - this.targetY) * (0.4 + Math.random() * 0.3);

        this.leafData = [];
        const leafCount = Math.floor(Math.random() * 2) + 1; 
        let sideTracker = Math.random() > 0.5 ? 1 : -1;
        for(let i = 0; i < leafCount; i++) {
            this.leafData.push({
                progressTrigger: 0.2 + (i * 0.3) + Math.random() * 0.1,
                scaleX: (1.0 + Math.random() * 0.3) * sideTracker,
                scaleY: 0.7 + Math.random() * 0.2,
                rotation: (-Math.PI / (4 + Math.random() * 2))
            });
            sideTracker *= -1;
        }
    }

    getBezierPoint(t) {
        const x = (1 - t) * (1 - t) * this.x + 2 * (1 - t) * t * this.controlX + t * t * this.x;
        const y = (1 - t) * (1 - t) * this.startY + 2 * (1 - t) * t * this.controlY + t * t * this.targetY;
        return { x, y };
    }

    getBezierAngle(t) {
        const dx = 2 * (1 - t) * (this.controlX - this.x) + 2 * t * (this.x - this.controlX);
        const dy = 2 * (1 - t) * (this.controlY - this.startY) + 2 * t * (this.targetY - this.controlY);
        return Math.atan2(dy, dx) + Math.PI / 2;
    }

    update() {
        if (this.currentProgress < 1) {
            this.currentProgress += this.growSpeed;
            if (this.currentProgress > 1) this.currentProgress = 1;
            
            const headPos = this.getBezierPoint(this.currentProgress);
            if (Math.random() < 0.12) {
                particles.push(new Particle(headPos.x, headPos.y));
            }
        } else if (this.bloomProgress < 1) {
            this.bloomProgress += 0.015;
            if (this.bloomProgress > 1) this.bloomProgress = 1;
            const headPos = this.getBezierPoint(1);
            if (Math.random() < 0.15) {
                particles.push(new Particle(headPos.x, headPos.y - 4));
            }
        }
    }

    drawLeaf(x, y, scaleX, scaleY, rotation) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rotation * (scaleX > 0 ? 1 : -1));
        ctx.scale(scaleX, scaleY);
        
        let leafGrad = ctx.createLinearGradient(0, 0, 15, -25);
        leafGrad.addColorStop(0, 'rgba(24, 43, 31, 0.85)');
        leafGrad.addColorStop(0.6, 'rgba(40, 66, 49, 0.55)');
        leafGrad.addColorStop(1, 'rgba(64, 94, 72, 0.1)');
        ctx.fillStyle = leafGrad;
        
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(10, -10, 8, -30);
        ctx.quadraticCurveTo(-3, -13, 0, 0);
        ctx.fill();
        ctx.restore();
    }

    drawPetal(w, h, angle) {
        ctx.save();
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(-w * 0.8, -h * 0.4, -w * 0.2, -h);
        ctx.lineTo(0, -h * 1.05); 
        ctx.lineTo(w * 0.2, -h);
        ctx.quadraticCurveTo(w * 0.8, -h * 0.4, 0, 0);
        ctx.fill();
        ctx.restore();
    }

    draw() {
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(this.x, this.startY);
        
        ctx.strokeStyle = '#142118'; 
        ctx.lineWidth = 2.0; 
        ctx.lineCap = 'round';
        
        if (this.currentProgress < 1) {
            for(let t=0; t<=this.currentProgress; t+=0.04) {
                let pt = this.getBezierPoint(t);
                ctx.lineTo(pt.x, pt.y);
            }
            ctx.stroke();
        } else {
            ctx.quadraticCurveTo(this.controlX, this.controlY, this.x, this.targetY);
            ctx.stroke();
        }

        this.leafData.forEach(leaf => {
            if (this.currentProgress > leaf.progressTrigger) {
                const leafPos = this.getBezierPoint(leaf.progressTrigger);
                const tangentAngle = this.getBezierAngle(leaf.progressTrigger);
                this.drawLeaf(leafPos.x, leafPos.y, leaf.scaleX, leaf.scaleY, leaf.rotation + tangentAngle);
            }
        });

        if (this.currentProgress >= 1 && this.bloomProgress > 0) {
            const size = this.maxFlowerSize * this.bloomProgress;
            const headPos = this.getBezierPoint(1);
            const tipAngle = this.getBezierAngle(1);
            
            ctx.translate(headPos.x, headPos.y);
            ctx.rotate(tipAngle);

            ctx.shadowBlur = 25;
            ctx.shadowColor = 'rgba(242, 109, 151, 0.3)';

            let outerGrad = ctx.createLinearGradient(0, 0, 0, -size);
            outerGrad.addColorStop(0, '#2d1222'); 
            outerGrad.addColorStop(0.6, '#bf4b75'); 
            outerGrad.addColorStop(1, '#e5a4b4'); 

            let innerGrad = ctx.createLinearGradient(0, 0, 0, -size * 0.9);
            innerGrad.addColorStop(0, '#591b37');
            innerGrad.addColorStop(0.7, '#f26d97');
            innerGrad.addColorStop(1, '#fff5ea');

            ctx.fillStyle = outerGrad;
            this.drawPetal(size * 0.7, size * 0.9, -Math.PI / 4 * this.bloomProgress);
            this.drawPetal(size * 0.7, size * 0.9, Math.PI / 4 * this.bloomProgress);
            this.drawPetal(size * 0.6, size * 1.0, -Math.PI / 7 * this.bloomProgress);
            this.drawPetal(size * 0.6, size * 1.0, Math.PI / 7 * this.bloomProgress);

            ctx.fillStyle = innerGrad;
            this.drawPetal(size * 0.5, size * 1.1, -Math.PI / 16 * this.bloomProgress);
            this.drawPetal(size * 0.5, size * 1.1, Math.PI / 16 * this.bloomProgress);
            this.drawPetal(size * 0.4, size * 1.15, 0); 

            if (this.bloomProgress > 0.5) {
                ctx.save();
                ctx.shadowColor = 'rgba(224, 176, 52, 0.5)';
                let coreGrad = ctx.createRadialGradient(0, -size*0.1, 0, 0, -size*0.1, size * 0.35);
                coreGrad.addColorStop(0, WHITE_CORE);
                coreGrad.addColorStop(0.3, '#e0b034');
                coreGrad.addColorStop(1, 'transparent');
                ctx.fillStyle = coreGrad;
                ctx.beginPath();
                ctx.arc(0, -size * 0.1, size * 0.25 * (this.bloomProgress - 0.5) * 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        ctx.restore();
    }
}

function initGarden() {
    resizeCanvas();
    flowers = [];
    particles = [];
    textTriggered = false;
    wowEffectTriggered = false;
    greetingText.innerHTML = "";
    wowOverlay.classList.remove('active');
    
    const totalStems = 18; 

    for (let i = 0; i < totalStems; i++) {
        // Balanced layout distribution logic across the entire canvas profile area width
        let xPos = (canvas.width * 0.05) + (Math.random() * (canvas.width * 0.90));
        let newLotus = new Lotus(xPos);
        flowers.push(newLotus);
    }
    
    // Sort flowers so shorter-stem background elements render behind taller elements nicely
    flowers.sort((a, b) => b.targetY - a.targetY);
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let bloomedCount = 0;
    flowers.forEach(flower => {
        flower.update();
        flower.draw();
        if (flower.bloomProgress >= 0.7) {
            bloomedCount++;
        }
    });

    // Triggers text gracefully once a beautiful subset of flowers are up
    if (bloomedCount >= 6 && !textTriggered && flowers.length > 0) {
        textTriggered = true;
        triggerMagicText("Have a Beautiful Day");
    }

    if (textTriggered && !wowEffectTriggered) {
        const lastCharDelay = 21 * 0.08; 
        const textDuration = lastCharDelay + 1.0; 
        
        wowEffectTriggered = true;
        setTimeout(triggerWowEffect, (textDuration * 1000)); 
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].alpha <= 0) {
            particles.splice(i, 1);
        }
    }

    animationId = requestAnimationFrame(animate);
}

function triggerMagicText(text) {
    greetingText.innerHTML = ""; 
    
    text.split("").forEach((char, index) => {
        let span = document.createElement("span");
        span.innerHTML = char === " " ? "&nbsp;" : char; 
        span.classList.add("magic-char");
        span.style.animationDelay = `${index * 0.08}s`; 
        greetingText.appendChild(span);
    });
}

function triggerWowEffect() {
    wowOverlay.classList.add('active');

    for (let i = 0; i < 50; i++) {
        const pX = Math.random() * canvas.width;
        const pY = Math.random() * (canvas.height * 0.7);
        
        const useGold = Math.random() > 0.4;
        const pColor = useGold ? WHITE_CORE : '#fff9f2';
        const pGlow = useGold ? GOLD_GLOW : PINK_GLOW;
        
        particles.push(new Particle(pX, pY, pColor, pGlow, 1.8, 0.8)); 
    }
}

window.addEventListener('load', () => {
    resizeCanvas();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
});

playBtn.addEventListener('click', () => {
    playBtn.classList.add('hide');
    cancelAnimationFrame(animationId);
    initGarden();
    animate();
});
</script>
</body>
</html>
