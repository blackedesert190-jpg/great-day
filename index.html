<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glowing Lotus Garden</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #060308;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        
        #container {
            position: relative;
            width: 92vw;
            height: 82vh;
            max-width: 400px;
            max-height: 700px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        canvas {
            background: radial-gradient(circle at center 75%, #140b1a 0%, #030105 100%);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* The WOW effect overlay matching the canvas precisely */
        #wowOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 24px;
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            transition: opacity 2s ease-out;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 3px);
            background-size: 250px 250px, 150px 150px, 100px 100px;
            animation: shimmerBackground 10s linear infinite;
        }

        @keyframes shimmerBackground {
            0% { background-position: 0 0, 20px 30px, 50px 70px; }
            100% { background-position: 250px 250px, 170px 180px, 150px 370px; }
        }

        #wowOverlay.active {
            opacity: 1;
            box-shadow: inset 0 0 80px 40px rgba(255, 229, 240, 0.25);
        }

        /* Large Centered Click Me Button */
        #playBtn {
            position: relative;
            z-index: 10;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, #d62462 0%, #591a32 100%);
            border: 2px solid #ff4081;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 64, 129, 0.5);
            transition: all 0.3s ease-out;
            touch-action: manipulation;
        }

        #playBtn:active {
            transform: scale(0.95);
        }

        /* Elegant text placed perfectly right above the blooming heads */
        #greetingText {
            position: absolute;
            top: 18%; /* Perfectly cradles the space above the flower growth zone */
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            font-family: "Didot", "Bodoni MT", "Cinzel", "Georgia", serif;
            font-size: 26px;
            font-weight: 300;
            font-style: italic;
            letter-spacing: 2px;
            color: #ffe5f0;
            text-align: center;
            pointer-events: none;
            width: 85%;
            text-shadow: 0 0 15px rgba(255, 102, 178, 0.8), 0 2px 4px rgba(0,0,0,0.9);
        }

        /* Individual Character Glow Entry for Magic Spell Effect */
        .magic-char {
            display: inline-block;
            opacity: 0;
            transform: translateY(-5px) scale(0.9);
            filter: blur(4px);
            animation: magicSpell 0.6s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes magicSpell {
            0% {
                opacity: 0;
                transform: translateY(-10px) scale(0.8);
                filter: blur(6px);
                color: #ffb300;
            }
            50% {
                opacity: 1;
                filter: blur(2px);
                color: #ff4081;
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0px);
                color: #ffe5f0;
            }
        }

        .hide {
            opacity: 0 !important;
            pointer-events: none !important;
            transform: scale(0.8) !important;
        }
    </style>
</head>
<body>

    <div id="container">
        <canvas id="lotusCanvas"></canvas>
        <div id="wowOverlay"></div>
        <button id="playBtn">CLICK ME</button>
        <div id="greetingText"></div>
    </div>

<script>
const canvas = document.getElementById('lotusCanvas');
const ctx = canvas.getContext('2d');
const playBtn = document.getElementById('playBtn');
const greetingText = document.getElementById('greetingText');
const wowOverlay = document.getElementById('wowOverlay');

let flowers = [];
let particles = [];
let animationId;
let textTriggered = false;
let wowEffectTriggered = false;

const PINK_GLOW = '#ff66b2';
const GOLD_GLOW = '#ffb300';
const WHITE_CORE = '#ffe5f0';

// Resize the drawing buffer to match the exact iPhone card resolution dynamically
function resizeCanvas() {
    const rect = container.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
}

class Particle {
    constructor(x, y, color = WHITE_CORE, glow = PINK_GLOW, speedMult = 1, sizeMult = 1) {
        this.x = x + (Math.random() * 30 - 15);
        this.y = y;
        this.size = (Math.random() * 2.5 + 0.5) * sizeMult;
        this.speedY = -(Math.random() * 1.0 + 0.4) * speedMult;
        this.speedX = (Math.random() * 0.8 - 0.4) * speedMult;
        this.alpha = 1;
        this.fade = (Math.random() * 0.009 + 0.004);
        this.color = color;
        this.glow = glow;
    }
    update() {
        this.y += this.speedY;
        this.x += this.speedX;
        this.alpha -= this.fade;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.glow;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

class Lotus {
    constructor(x) {
        this.x = x;
        this.startY = canvas.height + 20; // Starts right at the bottom edge
        this.currentProgress = 0; 
        this.growSpeed = 0.005 + Math.random() * 0.002;
        
        // Target height calibrated for typical iPhone display heights
        this.targetY = canvas.height * 0.42 + Math.random() * (canvas.height * 0.15); 
        this.bloomProgress = 0; 
        this.maxFlowerSize = canvas.width * 0.12; // Scaled relative to the width of the screen

        this.controlX = this.x + (Math.random() * 60 - 30);
        this.controlY = (canvas.height + this.targetY) / 2;

        this.leafData = [];
        const leafCount = 2; 
        let sideTracker = Math.random() > 0.5 ? 1 : -1;
        for(let i = 0; i < leafCount; i++) {
            this.leafData.push({
                progressTrigger: 0.3 + (i * 0.3),
                scaleX: 1.1 * sideTracker,
                scaleY: 0.9,
                rotation: (-Math.PI / 6)
            });
            sideTracker *= -1;
        }
    }

    getBezierPoint(t) {
        const x = (1 - t) * (1 - t) * this.x + 2 * (1 - t) * t * this.controlX + t * t * this.x;
        const y = (1 - t) * (1 - t) * this.startY + 2 * (1 - t) * t * this.controlY + t * t * this.targetY;
        return { x, y };
    }

    getBezierAngle(t) {
        const dx = 2 * (1 - t) * (this.controlX - this.x) + 2 * t * (this.x - this.controlX);
        const dy = 2 * (1 - t) * (this.controlY - this.startY) + 2 * t * (this.targetY - this.controlY);
        return Math.atan2(dy, dx) + Math.PI / 2;
    }

    update() {
        if (this.currentProgress < 1) {
            this.currentProgress += this.growSpeed;
            if (this.currentProgress > 1) this.currentProgress = 1;
            
            const headPos = this.getBezierPoint(this.currentProgress);
            if (Math.random() < 0.25) {
                particles.push(new Particle(headPos.x, headPos.y));
            }
        } else if (this.bloomProgress < 1) {
            this.bloomProgress += 0.015;
            if (this.bloomProgress > 1) this.bloomProgress = 1;
            const headPos = this.getBezierPoint(1);
            if (Math.random() < 0.35) {
                particles.push(new Particle(headPos.x, headPos.y - 5));
            }
        }
    }

    drawLeaf(x, y, scaleX, scaleY, rotation) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rotation * (scaleX > 0 ? 1 : -1));
        ctx.scale(scaleX, scaleY);
        
        let leafGrad = ctx.createLinearGradient(0, 0, 25, -35);
        leafGrad.addColorStop(0, 'rgba(34, 61, 41, 0.85)');
        leafGrad.addColorStop(0.6, 'rgba(54, 92, 64, 0.6)');
        leafGrad.addColorStop(1, 'rgba(90, 135, 100, 0.2)');
        ctx.fillStyle = leafGrad;
        
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(15, -15, 12, -45);
        ctx.quadraticCurveTo(-5, -20, 0, 0);
        ctx.fill();
        ctx.restore();
    }

    drawPetal(w, h, angle) {
        ctx.save();
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(-w * 0.8, -h * 0.4, -w * 0.2, -h);
        ctx.lineTo(0, -h * 1.05); 
        ctx.lineTo(w * 0.2, -h);
        ctx.quadraticCurveTo(w * 0.8, -h * 0.4, 0, 0);
        ctx.fill();
        ctx.restore();
    }

    draw() {
        ctx.save();
        
        ctx.beginPath();
        ctx.moveTo(this.x, this.startY);
        if (this.currentProgress < 1) {
            ctx.strokeStyle = '#2d4232'; 
            ctx.lineWidth = 3.5; 
            ctx.lineCap = 'round';
            for(let t=0; t<=this.currentProgress; t+=0.02) {
                let pt = this.getBezierPoint(t);
                ctx.lineTo(pt.x, pt.y);
            }
            ctx.stroke();
        } else {
            ctx.quadraticCurveTo(this.controlX, this.controlY, this.x, this.targetY);
            ctx.strokeStyle = '#2d4232'; 
            ctx.lineWidth = 3.5; 
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        this.leafData.forEach(leaf => {
            if (this.currentProgress > leaf.progressTrigger) {
                const leafPos = this.getBezierPoint(leaf.progressTrigger);
                const tangentAngle = this.getBezierAngle(leaf.progressTrigger);
                this.drawLeaf(leafPos.x, leafPos.y, leaf.scaleX, leaf.scaleY, leaf.rotation + tangentAngle);
            }
        });

        if (this.currentProgress >= 1 && this.bloomProgress > 0) {
            const size = this.maxFlowerSize * this.bloomProgress;
            const headPos = this.getBezierPoint(1);
            const tipAngle = this.getBezierAngle(1);
            
            ctx.translate(headPos.x, headPos.y);
            ctx.rotate(tipAngle);

            ctx.shadowBlur = 25;
            ctx.shadowColor = 'rgba(255, 50, 130, 0.4)';

            let outerGrad = ctx.createLinearGradient(0, 0, 0, -size);
            outerGrad.addColorStop(0, '#591a32'); 
            outerGrad.addColorStop(0.7, '#d62462'); 
            outerGrad.addColorStop(1, '#ff8fa9'); 

            let innerGrad = ctx.createLinearGradient(0, 0, 0, -size * 0.9);
            innerGrad.addColorStop(0, '#a62454');
            innerGrad.addColorStop(0.8, '#f74a87');
            innerGrad.addColorStop(1, '#ffb8ce');

            ctx.fillStyle = outerGrad;
            this.drawPetal(size * 0.7, size * 0.9, -Math.PI / 4 * this.bloomProgress);
            this.drawPetal(size * 0.7, size * 0.9, Math.PI / 4 * this.bloomProgress);
            this.drawPetal(size * 0.6, size * 1.0, -Math.PI / 7 * this.bloomProgress);
            this.drawPetal(size * 0.6, size * 1.0, Math.PI / 7 * this.bloomProgress);

            ctx.fillStyle = innerGrad;
            this.drawPetal(size * 0.5, size * 1.1, -Math.PI / 16 * this.bloomProgress);
            this.drawPetal(size * 0.5, size * 1.1, Math.PI / 16 * this.bloomProgress);
            this.drawPetal(size * 0.4, size * 1.15, 0); 

            if (this.bloomProgress > 0.5) {
                ctx.save();
                ctx.shadowColor = GOLD_GLOW;
                let coreGrad = ctx.createRadialGradient(0, -size*0.1, 0, 0, -size*0.1, size * 0.3);
                coreGrad.addColorStop(0, WHITE_CORE);
                coreGrad.addColorStop(0.4, GOLD_GLOW);
                coreGrad.addColorStop(1, 'transparent');
                ctx.fillStyle = coreGrad;
                ctx.beginPath();
                ctx.arc(0, -size * 0.1, size * 0.22 * (this.bloomProgress - 0.5) * 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        ctx.restore();
    }
}

function initGarden() {
    resizeCanvas();
    flowers = [];
    particles = [];
    textTriggered = false;
    wowEffectTriggered = false;
    greetingText.innerHTML = "";
    wowOverlay.classList.remove('active');
    
    const totalStems = 5; 
    const spacing = canvas.width / (totalStems + 1); 

    for (let i = 1; i <= totalStems; i++) {
        let xPos = (i * spacing);
        let newLotus = new Lotus(xPos);
        flowers.push(newLotus);
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let allBloomed = true;
    flowers.forEach(flower => {
        flower.update();
        flower.draw();
        if (flower.bloomProgress < 1) {
            allBloomed = false;
        }
    });

    if (allBloomed && !textTriggered && flowers.length > 0) {
        textTriggered = true;
        triggerMagicText("Have a Great Day!");
    }

    if (textTriggered && !wowEffectTriggered) {
        const lastCharDelay = 17 * 0.10; 
        const textDuration = lastCharDelay + 0.6; 
        
        wowEffectTriggered = true;
        setTimeout(triggerWowEffect, (textDuration * 1000) + 100); 
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].alpha <= 0) {
            particles.splice(i, 1);
        }
    }

    animationId = requestAnimationFrame(animate);
}

function triggerMagicText(text) {
    greetingText.innerHTML = ""; 
    
    text.split("").forEach((char, index) => {
        let span = document.createElement("span");
        span.innerHTML = char === " " ? "&nbsp;" : char; 
        span.classList.add("magic-char");
        span.style.animationDelay = `${index * 0.10}s`; 
        greetingText.appendChild(span);
    });
}

function triggerWowEffect() {
    wowOverlay.classList.add('active');

    for (let i = 0; i < 40; i++) {
        const pX = Math.random() * canvas.width;
        const pY = Math.random() * canvas.height;
        
        const useGold = Math.random() > 0.5;
        const pColor = useGold ? WHITE_CORE : '#fffced';
        const pGlow = useGold ? GOLD_GLOW : PINK_GLOW;
        
        particles.push(new Particle(pX, pY, pColor, pGlow, 2.5, 0.7)); 
    }
}

// Initial calculation
window.addEventListener('load', () => {
    resizeCanvas();
    // Pre-draw an empty canvas with the card background alignment
    ctx.clearRect(0, 0, canvas.width, canvas.height);
});

playBtn.addEventListener('click', () => {
    playBtn.classList.add('hide');
    cancelAnimationFrame(animationId);
    initGarden();
    animate();
});
</script>
</body>
</html>
